<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: linear-gradient(to bottom, #ff9a9e, #fecfef);
      color: white;
      overflow: hidden;
    }

    .box {
      margin-top: 60px;
    }

    h1 {
      font-size: 40px;
    }

    img {
      width: 220px;
      border-radius: 20px;
      margin-top: 10px;
    }

    p {
      font-size: 18px;
      margin: 20px;
      white-space: pre-line;
    }

    button {
      padding: 12px 25px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      margin: 10px;
      cursor: pointer;
      transition: transform 0.3s;
    }

    #yes {
      background: white;
      color: pink;
    }

    #no {
      background: red;
      color: white;
      position: absolute;
    }

    .heart {
      position: fixed;
      top: -10px;
      font-size: 20px;
      animation: fall linear infinite;
    }

    @keyframes fall {
      to {
        transform: translateY(100vh);
      }
    }
  </style>
</head>
<body>

<div class="box">
  <h1 id="title"></h1>

  <img src="photo.jpg">

  <p id="message"></p>

  <h2>Will you stay with me forever? 💍</h2>

  <button id="yes" onclick="love()">Yes 💖</button>
  <button id="no" onclick="growYes()">No 😢</button>
</div>

<script>
// Typing text
const titleText = "Hey my love ❤️";
const messageText = "You’re literally my favorite person ever 😭💕\n\nYou make everything better just by being you.\n\nAnd yeah… you have my heart.\n\nNo refunds 😌";

// Typing effect
let i = 0;
function typeTitle() {
  if (i < titleText.length) {
    document.getElementById("title").innerHTML += titleText.charAt(i);
    i++;
    setTimeout(typeTitle, 70);
  }
}

let j = 0;
function typeMessage() {
  if (j < messageText.length) {
    document.getElementById("message").innerHTML += messageText.charAt(j);
    j++;
    setTimeout(typeMessage, 30);
  }
}

// YES button grows when NO is clicked
let size = 1;

function growYes() {
  size += 0.5;

  const yesBtn = document.getElementById("yes");
  yesBtn.style.transform = "scale(" + size + ")";

  // Move NO button randomly
  const noBtn = document.getElementById("no");
  noBtn.style.top = Math.random() * window.innerHeight + "px";
  noBtn.style.left = Math.random() * window.innerWidth + "px";
}

// When YES is clicked
function love() {
  document.body.innerHTML = `
    <h1 style="margin-top: 100px; font-size: 50px;">
      let’s go ❤️
    </h1>
    <p style="font-size: 24px;">
      You just made me the happiest person alive 😭💕
    </p>
  `;
}

// Floating hearts
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "💖";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}

setInterval(createHeart, 300);

// Start animations
typeTitle();
setTimeout(typeMessage, 1500);
</script>

</body>
</html>
